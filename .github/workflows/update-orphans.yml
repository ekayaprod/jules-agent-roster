name: Update Orphans

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'fusion_matrix.json'

permissions:
  contents: read

jobs:
  update-orphans:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run update script
        run: node scripts/update-orphans.js

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add prompts/fusions prompts/orphans
          if ! git diff --staged --quiet; then
            git commit -m "chore: update orphans lists and move unreferenced fusions"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No changes to commit"
          fi
